apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-api
  namespace: smartops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-api
  template:
    metadata:
      labels:
        app: smartops-api
    spec:
      containers:
        - name: api
          image: smartops-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: smartops-config
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Server=smartops-sql;Database=SmartOpsDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: smartops-secrets
                  key: JWT_KEY
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: smartops-api
  namespace: smartops
spec:
  selector:
    app: smartops-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP