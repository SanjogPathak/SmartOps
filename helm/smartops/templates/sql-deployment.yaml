{{- if .Values.sql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-sql
  {{- if .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
spec:
  replicas: {{ .Values.sql.replicaCount }}
  selector:
    matchLabels:
      app: smartops-sql
  template:
    metadata:
      labels:
        app: smartops-sql
    spec:
      containers:
        - name: sqlserver
          image: {{ .Values.sql.image | quote }}
          ports:
            - containerPort: {{ .Values.sql.port }}
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartops-secrets
                  key: SA_PASSWORD
          volumeMounts:
            - name: sql-storage
              mountPath: /var/opt/mssql
      volumes:
        - name: sql-storage
          persistentVolumeClaim:
            claimName: smartops-sql-pvc
{{- end }}