namespace:
  create: false
  name: smartops

api:
  replicaCount: 1
  image:
    repository: smartops-api
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 8080

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  nodePort: 30080   # only used if type=NodePort

config:
  ASPNETCORE_ENVIRONMENT: Development
  redisHost: smartops-redis
  redisPort: 6379
  sqlHost: smartops-sql
  sqlDb: SmartOpsDb
  sqlUser: sa
  trustServerCertificate: true

secrets:
  saPassword: "YourStrong!Passw0rd"
  jwtKey: "CHANGE_ME_TO_LONG_RANDOM_STRING"

redis:
  enabled: true
  replicaCount: 1
  image: redis:7
  port: 6379

sql:
  enabled: true
  replicaCount: 1
  image: mcr.microsoft.com/mssql/server:2022-latest
  port: 1433
  storage:
    enabled: true
    size: 5Gi
    accessModes: ["ReadWriteOnce"]
    storageClassName: ""   # set for AKS (e.g., "managed-csi")

sqlInitJob:
  enabled: true
  image: mcr.microsoft.com/mssql-tools
  
serviceAccount:
  create: false
  name: ""
  
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  
ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: smartops.local
      paths:
        - path: /
          pathType: Prefix
  tls: []