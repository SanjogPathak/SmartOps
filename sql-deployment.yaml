apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartops-sql
  namespace: smartops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartops-sql
  template:
    metadata:
      labels:
        app: smartops-sql
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartops-secrets
                  key: SA_PASSWORD
          volumeMounts:
            - name: sql-storage
              mountPath: /var/opt/mssql
      volumes:
        - name: sql-storage
          persistentVolumeClaim:
            claimName: smartops-sql-pvc